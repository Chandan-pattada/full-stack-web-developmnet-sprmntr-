<!DOCTYPE html>
<html>
<head>
<title>Weather Dashboard</title>
<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
padding:40px;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:12px;
width:320px;
margin:auto;
box-shadow:0px 6px 15px rgba(0,0,0,0.2);
}

input{
padding:10px;
width:80%;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:6px;
background:#4facfe;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#2d8cf0;
}

#weather{
background:#e8f4ff;
padding:12px;
border-radius:8px;
margin-top:15px;
font-weight:bold;
}

#loading{
color:orange;
}

#error{
color:red;
}
</style>
</head>

<body>

<div class="container">

<h2>Weather Dashboard</h2>

<input type="text" id="city" placeholder="Enter city name">

<br>

<button onclick="getWeather()">Get Weather</button>

<p id="loading"></p>
<p id="weather"></p>
<p id="error"></p>

</div>

<script src="script.js"></script>

</body>
</html>
