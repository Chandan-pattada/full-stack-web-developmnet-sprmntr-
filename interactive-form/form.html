<!DOCTYPE html>
<html>
<head>
<title>Interactive Form</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.form-container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.2);
    width:300px;
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#2575fc;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1a5ed8;
}

.error{
    color:red;
}

.success{
    color:green;
}

</style>

</head>

<body>

<div class="form-container">

<h2>Registration Form</h2>

<form id="myForm">

<input type="text" id="name" placeholder="Enter your name">

<input type="text" id="email" placeholder="Enter your email">

<input type="password" id="password" placeholder="Enter password">

<button type="submit">Submit</button>

</form>

<p id="message"></p>

</div>

<script src="form.js"></script>

</body>
</html>
